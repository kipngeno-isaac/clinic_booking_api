name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: clinic
          POSTGRES_PASSWORD: clinic
          POSTGRES_DB: clinic_booking
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clinic -d clinic_booking"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_USER: clinic
      POSTGRES_PASSWORD: clinic
      POSTGRES_DB: clinic_booking
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest --cov=app --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t clinic-booking-api:${{ github.sha }} .
