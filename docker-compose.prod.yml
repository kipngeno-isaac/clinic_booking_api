services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clinic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinic}
      POSTGRES_DB: ${POSTGRES_DB:-clinic_booking}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clinic} -d ${POSTGRES_DB:-clinic_booking}"]
      interval: 5s
      timeout: 5s
      retries: 5
    # No host port mapping: only `api` needs to be reachable from outside
    # the VM, `db` only needs to be reachable from `api` on the Docker
    # network.

  api:
    image: docker.io/kipngenoisaac/clinic-booking-api:latest
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    # Bound to localhost only: reachable from the VM's own nginx (which
    # terminates TLS and reverse-proxies the public hostname), not directly
    # from the public internet.

volumes:
  postgres_data:
